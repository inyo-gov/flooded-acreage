project:
  type: website
  output-dir: docs
  # Avian page is developed locally (avian.qmd is gitignored); main site = Dashboard + About.
  render:
    - index.qmd
    - about.qmd
  resources:
    - flood_reports/csv_output/**
    - flood_reports/reports/**
    - .nojekyll
execute:
  dir: project

website:
  title: "Flooded Acreage Monitoring"
  site-url: https://inyo-gov.github.io/flooded-acreage/
  navbar:
    title: "Flooded Acreage Monitoring"
    logo: inyo_logo.png
    left:
      - href: index.html
        text: Dashboard
      - href: about.html
        text: About
      - icon: github
        href: https://github.com/inyo-gov/flooded-acreage
    background: dark
    search: true

format:
  html:
    theme: bootstrap
    linkcolor: "#0B3D91"
    css: styles.css
    include-in-header:
      - includes/dashboard-head.html
    toc: false
    code-fold: true
    code-tools: true
    fig-responsive: true
    table-responsive: false
    fig-dir: figure-html
    footer: "© 2026 Inyo County, California. All rights reserved."


